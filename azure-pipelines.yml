trigger:
- main

pool:
  vmImage: 'windows-latest'

variables:
  - name: buildConfiguration
    value: 'Release'
  - group: MAUI Secret

steps:

- task: Cache@2
  displayName: 'Cache .NET SDK'
  inputs:
    key: 'dotnet-sdk | "$(Agent.OS)"'
    path: 'C:\hostedtoolcache\windows\dotnet'
    cacheHitVar: 'DOTNET_CACHED'

- task: UseDotNet@2
  displayName: 'Install .NET SDK'
  inputs:
    version: '10.x'
  condition: ne(variables['DOTNET_CACHED'], 'true')

- task: Cache@2
  displayName: 'Cache MAUI Workload'
  inputs:
    key: 'maui-workload | "$(Agent.OS)"'
    path: 'C:\Users\VssAdministrator\.dotnet\workloads'
    cacheHitVar: 'MAUI_WORKLOAD_CACHED'

- script: dotnet workload install maui-android maui-ios maui-maccatalyst
  displayName: 'Install MAUI Workloads'
  condition: ne(variables['MAUI_WORKLOAD_CACHED'], 'true')

- task: Cache@2
  displayName: 'Cache Firebase CLI'
  inputs:
    key: 'firebase-tools | "$(Agent.OS)"'
    path: 'C:\Users\VssAdministrator\AppData\Roaming\npm'
    cacheHitVar: 'FIREBASE_CLI_CACHED'

- script: npm install -g firebase-tools
  displayName: 'Install Firebase CLI'
  condition: ne(variables['FIREBASE_CLI_CACHED'], 'true')

- script: dotnet restore MAUISampleCICDApp/MAUISampleCICDApp.csproj
  displayName: 'Restore NuGet Packages'

- task: DownloadSecureFile@1
  displayName: 'Download Keystore'
  name: keystore
  inputs:
    secureFile: 'sheik-release-key.jks'

- script: |
    dotnet publish MAUISampleCICDApp/MAUISampleCICDApp.csproj ^
      -c $(buildConfiguration) -f net10.0-android ^
      /p:AndroidSigningKeyStore=$(keystore.secureFilePath) ^
      /p:AndroidSigningKeyAlias=sheik-key-alias ^
      /p:AndroidSigningKeyPass=$(keyPassword) ^
      /p:AndroidSigningStorePass=$(keystorePassword) ^
      -o $(Build.ArtifactStagingDirectory)
  displayName: 'Build & Sign MAUI Android APK'

- task: PublishBuildArtifacts@1
  displayName: 'Publish APK Artifact'
  inputs:
    pathToPublish: '$(Build.ArtifactStagingDirectory)'
    artifactName: 'maui-android-apk'

- pwsh: |
    $apkPath = Get-ChildItem -Path $env:BUILD_ARTIFACTSTAGINGDIRECTORY -Filter "*-Signed.apk" -Recurse | Select-Object -First 1
    firebase appdistribution:distribute $apkPath.FullName `
      --app $env:FIREBASEAPPID `
      --token $env:FIREBASETOKEN `
      --groups $env:FIREBASERELEASEGROUP `
      --release-notes "Build from pipeline $env:BUILD_BUILDNUMBER"
  displayName: 'Distribute to Firebase App Distribution'
  env:
    FIREBASEAPPID: $(firebaseAppId)
    FIREBASETOKEN: $(firebaseToken)
    FIREBASERELEASEGROUP: $(firebaseReleaseGroup)