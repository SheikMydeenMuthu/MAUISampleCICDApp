trigger:
- main

pool:
  vmImage: 'windows-latest'

variables:
  buildConfiguration: 'Release'

steps:

- task: UseDotNet@2
  displayName: 'Install .NET SDK'
  inputs:
    version: '10.x'

- script: dotnet workload install maui-android maui-ios maui-maccatalyst
  displayName: 'Install MAUI Workloads'

- script: dotnet restore MAUISampleCICDApp/MAUISampleCICDApp.csproj
  displayName: 'Restore NuGet Packages'

- task: DownloadSecureFile@1
  displayName: 'Download Keystore'
  name: keystore
  inputs:
    secureFile: 'sheik-release-key.jks'

- script: |
    dotnet publish MAUISampleCICDApp/MAUISampleCICDApp.csproj `
      -c $(buildConfiguration) -f net10.0-android `
      /p:AndroidSigningKeyStore=$(keystore.secureFilePath) `
      /p:AndroidSigningKeyAlias=sheik-key-alias `
      /p:AndroidSigningKeyPass=$(keyPassword) `
      /p:AndroidSigningStorePass=$(keystorePassword) `
      -o $(Build.ArtifactStagingDirectory)
  displayName: 'Build & Sign MAUI Android APK'

- task: PublishBuildArtifacts@1
  displayName: 'Publish APK Artifact'
  inputs:
    pathToPublish: '$(Build.ArtifactStagingDirectory)'
    artifactName: 'maui-android-apk'